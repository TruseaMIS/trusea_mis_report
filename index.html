<!DOCTYPE html>
<html lang="en">
<head>

<title>TruSea Fish — MIS Report</title>
<style>

<body>

<!-- HEADER -->
<div class="header">
  <h1>🐟 Tru<span>Sea</span> Fish</h1>
  <div class="header-sub">MIS REPORT · MANAGEMENT SUMMARY</div>
  <div class="sync-row">
    <span class="sync-info" id="syncInfo">Loading…</span>
    <button class="sync-btn" onclick="init()">⟳ Refresh</button>
  </div>
</div>

<!-- DATE BANNER -->
<div class="date-banner">
  <div>
    <div class="today-lbl">Report Date</div>
    <div class="today-val" id="reportDate">—</div>
  </div>
  <div style="text-align:right">
    <div class="today-lbl">Fiscal Year Start</div>
    <div class="today-val" id="fyStart">—</div>
  </div>
</div>

<!-- CONTENT -->
<div id="content">
  <div class="loading"><div class="spinner"></div>Fetching data from sheet…</div>
</div>

<div class="footer-note" id="footerNote"></div>

<script>
// ── CONFIG ──────────────────────────────────────────
const SHEET_ID = '1LdJAHcoYX8ruxVEKG5j-X1KyaZohOLfhyYaUBmsVoyI';
const GID      = '1633140334'; // Sheet2

// Column mapping (A to K)
const COL = {
  timestamp:  'Timestamp',    // A
  orderId:    'Order ID',     // B
  name:       'Name',         // C
  phone:      'Phone',        // D
  address:    'Address',      // E
  mapLink:    'Map Link',     // F
  product:    'Product',      // G
  addons:     'Add-ons',      // H
  prebook:    'Pre-Book',     // I
  price:      'Price',        // J  (skip display)
  orderTotal: 'Order Total',  // K
};

// Fiscal year start month (0 = Jan, 3 = Apr)
const FY_START_MONTH = 3; // April

// ── DATE HELPERS ────────────────────────────────────
const today = new Date();
today.setHours(0,0,0,0);

function startOfDay(d) { const x=new Date(d); x.setHours(0,0,0,0); return x; }
function endOfDay(d)   { const x=new Date(d); x.setHours(23,59,59,999); return x; }

// Today
const todayStart = startOfDay(today);
const todayEnd   = endOfDay(today);

// Month to date: 1st of current month → today
const mtdStart = new Date(today.getFullYear(), today.getMonth(), 1);
const mtdEnd   = endOfDay(today);

// Year to date: April 1st of current fiscal year → today
function getFYStart() {
  const yr  = today.getFullYear();
  const mon = today.getMonth();
  // If current month is before FY_START_MONTH, FY started previous year
  const fyYear = mon < FY_START_MONTH ? yr - 1 : yr;
  return new Date(fyYear, FY_START_MONTH, 1);
}
const ytdStart = getFYStart();
const ytdEnd   = endOfDay(today);

// Format date nicely
function fmt(d) {
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtShort(d) {
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short' });
}

// Update date banner
document.getElementById('reportDate').textContent = fmt(today);
document.getElementById('fyStart').textContent    = fmt(ytdStart);

// ── FETCH ────────────────────────────────────────────
function fetchSheet() {
  return new Promise((resolve, reject) => {
    document.querySelectorAll('script[id^="mis_"]').forEach(s => s.remove());
    Object.keys(window).filter(k => k.startsWith('__misCB_')).forEach(k => delete window[k]);

    const cb    = '__misCB_' + Date.now();
    const timer = setTimeout(() => { delete window[cb]; reject(new Error('Timeout')); }, 12000);

    window[cb] = function(data) {
      clearTimeout(timer);
      delete window[cb];
      try {
        if (!data.table || !data.table.rows || !data.table.rows.length)
          return reject(new Error('No data'));

        const labels = (data.table.cols || []).map(c => (c.label||'').trim());
        const fi = name => {
          if (!name) return -1;
          let i = labels.findIndex(c => c === name);
          if (i >= 0) return i;
          i = labels.findIndex(c => c.toLowerCase() === name.toLowerCase());
          if (i >= 0) return i;
          return labels.findIndex(c => c.toLowerCase().includes(name.toLowerCase()));
        };

        const iTs    = fi(COL.timestamp);
        const iName  = fi(COL.name);
        const iTotal = fi(COL.orderTotal);

        const v  = (r,i) => (i>=0 && r.c[i] && r.c[i].v!=null) ? String(r.c[i].v).trim() : '';
        const fv = (r,i) => (i>=0 && r.c[i]) ? (r.c[i].f || v(r,i)) : '';

        // Parse timestamp → JS Date
        const parseTs = (r, i) => {
          if (i < 0 || !r.c[i] || r.c[i].v == null) return null;
          const raw = r.c[i].v;
          if (typeof raw === 'string' && raw.startsWith('Date(')) {
            const p = raw.replace('Date(','').replace(')','').split(',');
            return new Date(+p[0], +p[1], +p[2], +(p[3]||0), +(p[4]||0));
          }
          // Try parsing formatted value
          if (r.c[i].f) {
            const d = new Date(r.c[i].f);
            if (!isNaN(d)) return d;
          }
          return null;
        };

        // Parse order total → number
        const parseTotal = str => {
          if (!str) return 0;
          const n = parseFloat(str.replace(/[^0-9.]/g,''));
          return isNaN(n) ? 0 : n;
        };

        const iProduct = fi(COL.product);

        const rows = data.table.rows.map((r, idx) => ({
          name:    v(r, iName),
          ts:      parseTs(r, iTs),
          total:   parseTotal(fv(r, iTotal) || v(r, iTotal)),
          product: v(r, iProduct),
        })).filter(o => o.name && o.name.length > 1 && o.ts);

        resolve(rows);
      } catch(e) { reject(e); }
    };

    const s   = document.createElement('script');
    s.id      = 'mis_' + Date.now();
    s.src     = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=${GID}&v=${Date.now()}&r=${Math.random()}`;
    s.onerror = () => { clearTimeout(timer); reject(new Error('Failed to load')); };
    document.head.appendChild(s);
  });
}

// ── FILTER HELPERS ───────────────────────────────────
function inRange(o, start, end) {
  if (!o.ts) return false;
  return o.ts >= start && o.ts <= end;
}

function sumTotal(list) {
  return list.reduce((acc, o) => acc + o.total, 0);
}

function fmtMoney(n) {
  return '₹' + n.toLocaleString('en-IN', { maximumFractionDigits: 0 });
}

function fmtTime(d) {
  if (!d) return '';
  return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
}

// ── RENDER ───────────────────────────────────────────
function renderMIS(allRows) {
  const todayOrders = allRows.filter(o => inRange(o, todayStart, todayEnd));
  const mtdOrders   = allRows.filter(o => inRange(o, mtdStart,   mtdEnd));
  const ytdOrders   = allRows.filter(o => inRange(o, ytdStart,   ytdEnd));

  const todaySum = sumTotal(todayOrders);
  const mtdSum   = sumTotal(mtdOrders);
  const ytdSum   = sumTotal(ytdOrders);

  // Latest order time today
  const latestOrder = todayOrders.length
    ? todayOrders.slice().sort((a,b) => b.ts - a.ts)[0]
    : null;

  // Avg order value today
  const avgToday = todayOrders.length ? Math.round(todaySum / todayOrders.length) : 0;
  const avgMtd   = mtdOrders.length   ? Math.round(mtdSum   / mtdOrders.length)   : 0;

// Daily breakdown for MTD (one row per day)
function renderDailyBreakdown(orders, start, end) {
  if (!orders.length) return `<div class="empty-row">No orders this month yet</div>`;

  const days = [];
  const cur = new Date(start);
  while (cur <= end) {
    const dayStart = startOfDay(cur);
    const dayEnd   = endOfDay(cur);
    const dayOrders = orders.filter(o => inRange(o, dayStart, dayEnd));
    if (dayOrders.length > 0) {
      days.push({ date: new Date(cur), count: dayOrders.length, total: sumTotal(dayOrders) });
    }
    cur.setDate(cur.getDate() + 1);
  }

  return days.slice().reverse().map(d => `
    <div class="breakdown-row">
      <div class="br-name">${d.date.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'})}</div>
      <div class="br-time">${d.count} order${d.count>1?'s':''}</div>
      <div class="br-val">${fmtMoney(d.total)}</div>
    </div>`).join('');
}

// Monthly breakdown for YTD (one row per month)
function renderMonthlyBreakdown(orders, start, end) {
  if (!orders.length) return `<div class="empty-row">No orders this year yet</div>`;

  const months = [];
  const cur = new Date(start.getFullYear(), start.getMonth(), 1);
  while (cur <= end) {
    const mStart = new Date(cur.getFullYear(), cur.getMonth(), 1);
    const mEnd   = new Date(cur.getFullYear(), cur.getMonth()+1, 0, 23, 59, 59);
    const mOrders = orders.filter(o => inRange(o, mStart, mEnd));
    months.push({
      label:  cur.toLocaleDateString('en-IN',{month:'long',year:'numeric'}),
      count:  mOrders.length,
      total:  sumTotal(mOrders),
    });
    cur.setMonth(cur.getMonth() + 1);
  }

  return months.slice().reverse().map(m => `
    <div class="breakdown-row">
      <div class="br-name">${m.label}</div>
      <div class="br-time">${m.count} order${m.count>1?'s':''}</div>
      <div class="br-val">${fmtMoney(m.total)}</div>
    </div>`).join('');
}


// ── KG PARSING ───────────────────────────────────────
function parseProductKg(productStr) {
  if (!productStr) return [];
  const results = [];
  const items = productStr.split(/[,\n]+/);
  for (let item of items) {
    item = item.trim();
    if (!item) continue;
    const kgMatch = item.match(/(\d+(?:\.\d+)?)\s*k(?:g|gs)\b/i);
    const gMatch  = item.match(/(\d+(?:\.\d+)?)\s*g\b(?!m)/i);
    let kg = 0;
    if (kgMatch) {
      kg = parseFloat(kgMatch[1]);
    } else if (gMatch) {
      kg = parseFloat(gMatch[1]) / 1000;
    }
    if (kg <= 0) continue;
    let fish = item
      .replace(/(\d+(?:\.\d+)?)\s*k(?:g|gs)\b/gi, '')
      .replace(/(\d+(?:\.\d+)?)\s*g\b/gi, '')
      .replace(/[-\u2013\u2014|]/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase()
      .replace(/\b\w/g, c => c.toUpperCase());
    if (fish.length < 2) fish = 'Unknown Fish';
    results.push({ fish, kg });
  }
  return results;
}

function aggregateKg(orders) {
  const map = {};
  let totalKg = 0;
  for (const o of orders) {
    const items = parseProductKg(o.product);
    for (const { fish, kg } of items) {
      if (!map[fish]) map[fish] = { kg: 0, orders: 0 };
      map[fish].kg += kg;
      map[fish].orders++;
      totalKg += kg;
    }
  }
  const sorted = Object.entries(map)
    .map(([fish, d]) => ({ fish, kg: d.kg, orders: d.orders }))
    .sort((a, b) => b.kg - a.kg);
  return { sorted, totalKg };
}

let _kgAllRows = [];
let _activeKgTab = 'daily';

function renderKgSection(allRows) {
  _kgAllRows = allRows;
  const tab = _activeKgTab;
  const now   = new Date();
  const tS    = startOfDay(now);
  const tE    = endOfDay(now);
  const dow   = now.getDay();
  const diff  = (dow === 0) ? -6 : 1 - dow;
  const wS    = startOfDay(new Date(now)); wS.setDate(now.getDate() + diff);
  const wE    = endOfDay(now);
  const mS    = new Date(now.getFullYear(), now.getMonth(), 1);
  const mE    = endOfDay(now);

  let orders, label, rangeStr;
  if (tab === 'daily') {
    orders = allRows.filter(o => inRange(o, tS, tE));
    label  = 'Today'; rangeStr = fmt(now);
  } else if (tab === 'weekly') {
    orders = allRows.filter(o => inRange(o, wS, wE));
    label  = 'This Week'; rangeStr = fmtShort(wS) + ' – ' + fmtShort(now);
  } else {
    orders = allRows.filter(o => inRange(o, mS, mE));
    label  = 'This Month'; rangeStr = fmtShort(mS) + ' – ' + fmtShort(now);
  }

  const { sorted, totalKg } = aggregateKg(orders);
  const maxKg = sorted.length ? sorted[0].kg : 1;

  const fishRows = sorted.length === 0
    ? '<div class="empty-row">No kg data found — check column G has entries like "Vanjaram 1kg"</div>'
    : sorted.map((f, i) =>
        '<div class="fish-kg-row">' +
        '<div class="fish-rank ' + (i===0?'r1':i===1?'r2':i===2?'r3':'') + '">' + (i+1) + '</div>' +
        '<div class="fish-name">' + f.fish + '</div>' +
        '<div class="fish-kg-bar-wrap"><div class="fish-kg-bar" style="width:' + Math.round((f.kg/maxKg)*100) + '%"></div></div>' +
        '<div class="fish-orders">' + f.orders + ' ord</div>' +
        '<div class="fish-kg-val">' + (f.kg % 1 === 0 ? f.kg : f.kg.toFixed(2)) + ' kg</div>' +
        '</div>'
      ).join('');

  let extraBreakdown = '';
  if (tab === 'weekly') {
    const days = [];
    const cur = new Date(wS);
    while (cur <= now) {
      const ds = startOfDay(cur), de = endOfDay(cur);
      const dOrders = allRows.filter(o => inRange(o, ds, de));
      const { totalKg: dKg } = aggregateKg(dOrders);
      days.push({ date: new Date(cur), kg: dKg, count: dOrders.length });
      cur.setDate(cur.getDate()+1);
    }
    extraBreakdown = '<div class="breakdown-title">Day-wise KG This Week</div>' +
      days.slice().reverse().map(d =>
        '<div class="week-row">' +
        '<div class="week-label">' + d.date.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'}) + '</div>' +
        '<div class="week-range">' + d.count + ' order' + (d.count!==1?'s':'') + '</div>' +
        '<div class="week-kg">' + d.kg.toFixed(2) + ' kg</div>' +
        '</div>'
      ).join('');
  }

  if (tab === 'monthly') {
    const fyYear = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear()-1;
    const aprilStart = new Date(fyYear, 3, 1);
    const months = [];
    const mcur = new Date(aprilStart.getFullYear(), aprilStart.getMonth(), 1);
    while (mcur <= now) {
      const ms2 = new Date(mcur.getFullYear(), mcur.getMonth(), 1);
      const me2 = new Date(mcur.getFullYear(), mcur.getMonth()+1, 0, 23, 59, 59);
      const mOrds = allRows.filter(o => inRange(o, ms2, me2));
      const { totalKg: mKg } = aggregateKg(mOrds);
      months.push({ label: mcur.toLocaleDateString('en-IN',{month:'long',year:'numeric'}), kg: mKg, count: mOrds.length });
      mcur.setMonth(mcur.getMonth()+1);
    }
    const maxMKg = months.reduce((m,x) => Math.max(m, x.kg), 1);
    extraBreakdown = '<div class="breakdown-title">Monthly KG (April onwards)</div>' +
      months.slice().reverse().map(m =>
        '<div class="month-kg-row">' +
        '<div class="month-kg-label">' + m.label + '</div>' +
        '<div class="month-kg-bar-wrap"><div class="month-kg-bar" style="width:' + Math.round((m.kg/maxMKg)*100) + '%"></div></div>' +
        '<div class="month-kg-orders">' + m.count + ' orders</div>' +
        '<div class="month-kg-val">' + m.kg.toFixed(2) + ' kg</div>' +
        '</div>'
      ).join('');
  }

  const el = document.getElementById('kgSectionContent');
  if (!el) return;
  el.innerHTML =
    '<div class="kg-summary-grid">' +
      '<div class="kg-summary-cell"><div class="kg-summary-val highlight">' + (totalKg % 1 === 0 ? totalKg : totalKg.toFixed(2)) + '</div><div class="kg-summary-lbl">Total KG</div></div>' +
      '<div class="kg-summary-cell"><div class="kg-summary-val">' + orders.length + '</div><div class="kg-summary-lbl">Orders</div></div>' +
      '<div class="kg-summary-cell"><div class="kg-summary-val">' + sorted.length + '</div><div class="kg-summary-lbl">Fish Types</div></div>' +
    '</div>' +
    '<div class="fish-kg-table">' +
      '<div class="fish-kg-header"><span>Fish</span><span>' + label + ' KG Sold</span></div>' +
      fishRows +
      (extraBreakdown ? '<div style="margin-top:6px">' + extraBreakdown + '</div>' : '') +
    '</div>';
}

function switchKgTab(tab) {
  _activeKgTab = tab;
  document.querySelectorAll('.kg-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderKgSection(_kgAllRows);
}

// ── INIT ─────────────────────────────────────────────
async function init() {
  document.getElementById('syncInfo').textContent = 'Syncing…';
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div>Fetching data…</div>';
  try {
    const rows = await fetchSheet();
    renderMIS(rows);
    document.getElementById('syncInfo').textContent =
      `✓ Synced · ${new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    document.getElementById('syncInfo').textContent = '⚠ Could not connect to sheet';
    document.getElementById('content').innerHTML =
      `<div class="loading">⚠ ${e.message}<br><br>Make sure sheet is shared as<br>"Anyone with the link → Viewer"</div>`;
  }
}

// Auto sync every 10 minutes
init();
setInterval(init, 10 * 60 * 1000);
